<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemBuilder: Sec 3 G2 Ionic Formulae</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX CSS & JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes bounceShort { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-bounce-short { animation: bounceShort 0.5s ease-in-out; }
        
        /* Hide number input arrows for cleaner subscript look */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    
    <div style="display: none;" class="bg-red-50 border-red-200 text-red-800 text-red-600 bg-orange-50 border-orange-200 text-orange-800 text-orange-600 bg-yellow-50 border-yellow-200 text-yellow-800 text-yellow-600 bg-blue-50 border-blue-200 text-blue-800 text-blue-600 bg-indigo-50 border-indigo-200 text-indigo-800 text-indigo-600 bg-green-50 border-green-200 text-green-900 bg-teal-50 border-teal-200 text-teal-900 hover:bg-indigo-700 bg-indigo-600 text-rose-500 bg-rose-600 hover:bg-rose-700 border-rose-700 bg-rose-900/40 text-rose-200 bg-slate-100 bg-slate-200 bg-slate-300 bg-slate-800 bg-slate-900 text-white text-slate-400 text-slate-500 text-slate-600 text-slate-700 text-slate-800 border-slate-200 border-slate-300 border-slate-700"></div>

    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef } = React;

        const Icon = ({ path, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
        );
        const BeakerIcon = (p) => <Icon {...p} path='<path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M14 9h4"/>' />;
        const ArrowRightIcon = (p) => <Icon {...p} path='<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>' />;
        const ArrowLeftIcon = (p) => <Icon {...p} path='<path d="M19 12H5"/><path d="m12 19-7-7 7-7"/>' />;
        const CheckCircleIcon = (p) => <Icon {...p} path='<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/>' />;
        const LightbulbIcon = (p) => <Icon {...p} path='<path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/>' />;
        const MessageSquareIcon = (p) => <Icon {...p} path='<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>' />;
        const ShieldAlertIcon = (p) => <Icon {...p} path='<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/>' />;
        const BookOpenIcon = (p) => <Icon {...p} path='<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>' />;
        const RefreshCwIcon = (p) => <Icon {...p} path='<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>' />;
        const EyeIcon = (p) => <Icon {...p} path='<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>' />;
        const CopyIcon = (p) => <Icon {...p} path='<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>' />;
        const XIcon = (p) => <Icon {...p} path='<path d="M18 6 6 18"/><path d="m6 6 12 12"/>' />;
        const TargetIcon = (p) => <Icon {...p} path='<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>' />;
        const TrashIcon = (p) => <Icon {...p} path='<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>' />;
        const LockIcon = (p) => <Icon {...p} path='<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>' />;

        const firebaseConfig = {
            apiKey: "AIzaSyDRO8liDHigDRzV0jpHn3c4SmDlC-l3qLc",
            authDomain: "chem-detective-2026.firebaseapp.com",
            projectId: "chem-detective-2026",
            storageBucket: "chem-detective-2026.firebasestorage.app",
            messagingSenderId: "477655926627",
            appId: "1:477655926627:web:2a7d12a0163b54af5ab556"
        };

        const isLiveMode = !!firebaseConfig.apiKey;
        let app, auth, db;

        if (isLiveMode) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        const CATIONS = [
          { symbol: 'Na', charge: 1, name: 'Sodium' },
          { symbol: 'K', charge: 1, name: 'Potassium' },
          { symbol: 'Mg', charge: 2, name: 'Magnesium' },
          { symbol: 'Ca', charge: 2, name: 'Calcium' },
          { symbol: 'Al', charge: 3, name: 'Aluminium' },
        ];

        const ANIONS = [
          { symbol: 'Cl', charge: 1, name: 'Chloride', isPoly: false },
          { symbol: 'O', charge: 2, name: 'Oxide', isPoly: false },
          { symbol: 'N', charge: 3, name: 'Nitride', isPoly: false },
          { symbol: 'NO3', charge: 1, name: 'Nitrate', isPoly: true },
          { symbol: 'SO4', charge: 2, name: 'Sulfate', isPoly: true },
          { symbol: 'OH', charge: 1, name: 'Hydroxide', isPoly: true },
        ];

        const Latex = ({ children }) => {
          const containerRef = useRef(null);
          useEffect(() => {
            if (window.katex && containerRef.current && children) {
              window.katex.render(children.toString(), containerRef.current, { throwOnError: false });
            }
          }, [children]);
          return <span ref={containerRef} className="inline-block">{children}</span>;
        };

        const formatIonLatex = (ion, isCation, crossStep = 0) => {
          let sym = `\\mathrm{${ion.symbol.replace(/(\d+)/g, '_{$1}')}}`;
          let chargeColor = isCation ? '#fbbf24' : '#38bdf8'; 
          let sign = isCation ? '+' : '-';
          let chargeNum = ion.charge;
          if (ion.charge === 1 && crossStep >= 1) chargeNum = '1';
          else if (ion.charge === 1 && crossStep === 0) chargeNum = '';
          let coloredNum = (crossStep >= 1 && chargeNum !== '') ? `\\textcolor{${chargeColor}}{${chargeNum}}` : chargeNum;
          return `${sym}^{${coloredNum}${sign}}`;
        };

        const formatFormulaLatex = (cat, an, catSub, anSub) => {
          const cSym = `\\mathrm{${cat.symbol.replace(/(\d+)/g, '_{$1}')}}`;
          const aSym = `\\mathrm{${an.symbol.replace(/(\d+)/g, '_{$1}')}}`;
          let cPart = cat.isPoly && catSub > 1 ? `\\left(${cSym}\\right)` : cSym;
          let aPart = an.isPoly && anSub > 1 ? `\\left(${aSym}\\right)` : aSym;
          let cSubStr = catSub > 1 ? `_{\\textcolor{#38bdf8}{${catSub}}}` : '';
          let aSubStr = anSub > 1 ? `_{\\textcolor{#fbbf24}{${anSub}}}` : '';
          return `${cPart}${cSubStr}${aPart}${aSubStr}`;
        };

        function App() {
          const [currentStep, setCurrentStep] = useState(0);
          const [user, setUser] = useState(null);
          const [studentName, setStudentName] = useState("");
          const [showTeacherView, setShowTeacherView] = useState(false);

          useEffect(() => {
            if (!isLiveMode) return;
            const initAuth = async () => {
              try { await signInAnonymously(auth); } catch (e) { console.error("Auth init error:", e); }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, setUser);
            return () => unsubscribe();
          }, []);

          const submitResponse = async (phaseTitle, text) => {
            if (!studentName.trim() || !isLiveMode || !db) return;
            try {
              await addDoc(collection(db, 'studentResponses'), {
                studentName, phase: phaseTitle, text, timestamp: Date.now()
              });
            } catch (e) { 
                console.error("Submission failed: ", e); 
            }
          };

          const steps = [
            { title: "Phase 1: Periodic Table", component: <IntroScreen studentName={studentName} setStudentName={setStudentName} onNext={() => setCurrentStep(1)} /> },
            { title: "Phase 2: Evidence & Criss-Cross", component: <CrissCrossScreen onNext={() => setCurrentStep(2)} onPrev={() => setCurrentStep(0)} /> },
            { title: "Phase 3a: The Debate", component: <DebateInputScreen onNext={() => setCurrentStep(3)} onPrev={() => setCurrentStep(1)} submitResponse={(t) => submitResponse("Phase 3: The Debate", t)} /> },
            { title: "Phase 3b: Evaluation", component: <DebateFeedbackScreen onNext={() => setCurrentStep(4)} onPrev={() => setCurrentStep(2)} /> },
            { title: "Phase 4a: Context Shift", component: <ContextInputScreen onNext={() => setCurrentStep(5)} onPrev={() => setCurrentStep(3)} submitResponse={(t) => submitResponse("Phase 4: Polyatomic Context", t)} /> },
            { title: "Phase 4b: The Convention", component: <ContextFeedbackScreen onNext={() => setCurrentStep(6)} onPrev={() => setCurrentStep(4)} /> },
            { title: "Phase 5: Practice", component: <PracticeScreen onNext={() => setCurrentStep(7)} onPrev={() => setCurrentStep(5)} submitResponse={(t) => submitResponse("Phase 5: Practice Quiz", t)} /> }, 
            { title: "Phase 6: Summary", component: <SummaryScreen onReset={() => {setCurrentStep(0); setStudentName("");}} onPrev={() => setCurrentStep(6)} /> },
          ];

          if (showTeacherView) return <TeacherDashboard onClose={() => setShowTeacherView(false)} user={user} />;

          return (
            <div className="flex-grow flex flex-col w-full font-sans text-slate-800">
              <header className="bg-indigo-600 text-white p-4 shadow-md sticky top-0 z-10 w-full">
                <div className="max-w-4xl mx-auto flex justify-between items-center">
                  <div className="flex items-center gap-2">
                    <BeakerIcon size={24} />
                    <h1 className="text-xl font-bold tracking-wide">ChemBuilder: Sec 3 G2</h1>
                  </div>
                  <div className="flex items-center gap-4">
                    <button onClick={() => setShowTeacherView(true)} className="text-indigo-200 hover:text-white transition-colors" title="Teacher Dashboard"><EyeIcon size={20} /></button>
                    <div className="text-xs font-bold bg-indigo-700 px-3 py-1.5 rounded-full uppercase tracking-wider shadow-inner">{steps[currentStep].title}</div>
                  </div>
                </div>
              </header>
              <main className="max-w-4xl mx-auto p-4 md:p-8 flex-grow w-full">
                <div className="bg-white rounded-2xl shadow-md border border-slate-200 p-6 md:p-10">{steps[currentStep].component}</div>
              </main>
              <footer className="text-center py-6 text-slate-400 text-sm font-medium">
                ChemBuilder &copy; {new Date().getFullYear()} &mdash; E21CC Science Interactive
              </footer>
            </div>
          );
        }

        function IntroScreen({ studentName, setStudentName, onNext }) {
          return (
            <div className="space-y-6 animate-fade-in">
              <div className="flex items-center gap-3 text-indigo-600"><BookOpenIcon size={32} /><h2 className="text-3xl font-extrabold text-slate-800">Charges from the Periodic Table</h2></div>
              <p className="text-slate-600">The Group number tells us how many valence electrons an element has, which determines the charge of its ion.</p>
              
              <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mt-6">
                <div className="bg-red-50 border border-red-200 p-4 rounded-xl text-center shadow-sm">
                  <div className="font-bold text-red-800 mb-1 uppercase text-xs">Group 1</div>
                  <div className="text-xs text-red-600 mb-2 h-8">Loses 1 valence <Latex>{"e^-"}</Latex></div>
                  <div className="text-2xl font-black text-red-600 mb-1"><Latex>+1</Latex></div>
                  <div className="text-xs text-slate-500 border-t border-red-100 pt-2 mt-2">e.g., <Latex>{"\\mathrm{Na}^+, \\mathrm{K}^+"}</Latex></div>
                </div>

                <div className="bg-orange-50 border border-orange-200 p-4 rounded-xl text-center shadow-sm">
                  <div className="font-bold text-orange-800 mb-1 uppercase text-xs">Group 2</div>
                  <div className="text-xs text-orange-600 mb-2 h-8">Loses 2 valence <Latex>{"e^-"}</Latex></div>
                  <div className="text-2xl font-black text-orange-600 mb-1"><Latex>+2</Latex></div>
                  <div className="text-xs text-slate-500 border-t border-orange-100 pt-2 mt-2">e.g., <Latex>{"\\mathrm{Mg}^{2+}, \\mathrm{Ca}^{2+}"}</Latex></div>
                </div>

                <div className="bg-yellow-50 border border-yellow-200 p-4 rounded-xl text-center shadow-sm">
                  <div className="font-bold text-yellow-800 mb-1 uppercase text-xs">Group 13</div>
                  <div className="text-xs text-yellow-700 mb-2 h-8">Loses 3 valence <Latex>{"e^-"}</Latex></div>
                  <div className="text-2xl font-black text-yellow-600 mb-1"><Latex>+3</Latex></div>
                  <div className="text-xs text-slate-500 border-t border-yellow-100 pt-2 mt-2">e.g., <Latex>{"\\mathrm{Al}^{3+}"}</Latex></div>
                </div>

                <div className="bg-blue-50 border border-blue-200 p-4 rounded-xl text-center shadow-sm">
                  <div className="font-bold text-blue-800 mb-1 uppercase text-xs">Group 16</div>
                  <div className="text-xs text-blue-600 mb-2 h-8">Gains 2 <Latex>{"e^-"}</Latex> to be full</div>
                  <div className="text-2xl font-black text-blue-600 mb-1"><Latex>-2</Latex></div>
                  <div className="text-xs text-slate-500 border-t border-blue-100 pt-2 mt-2">e.g., <Latex>{"\\mathrm{O}^{2-}, \\mathrm{S}^{2-}"}</Latex></div>
                </div>

                <div className="bg-indigo-50 border border-indigo-200 p-4 rounded-xl text-center shadow-sm">
                  <div className="font-bold text-indigo-800 mb-1 uppercase text-xs">Group 17</div>
                  <div className="text-xs text-indigo-600 mb-2 h-8">Gains 1 <Latex>{"e^-"}</Latex> to be full</div>
                  <div className="text-2xl font-black text-indigo-600 mb-1"><Latex>-1</Latex></div>
                  <div className="text-xs text-slate-500 border-t border-indigo-100 pt-2 mt-2">e.g., <Latex>{"\\mathrm{Cl}^-, \\mathrm{F}^-"}</Latex></div>
                </div>
              </div>

              <div className="bg-indigo-50 border border-indigo-200 p-6 rounded-xl mt-8">
                <h3 className="font-bold text-indigo-800 mb-3">Identify Yourself</h3>
                <input 
                  type="text" 
                  placeholder="Your Name" 
                  className="w-full p-3 border border-indigo-300 rounded-lg text-lg outline-none focus:ring-2 focus:ring-indigo-500 transition-shadow" 
                  value={studentName} 
                  onChange={(e) => setStudentName(e.target.value)} 
                />
              </div>
              <div className="flex justify-end pt-4">
                <button onClick={onNext} disabled={!studentName.trim()} className={`font-semibold py-3 px-6 rounded-lg flex items-center gap-2 transition-all ${studentName.trim() ? 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg transform hover:-translate-y-0.5' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>Start Detective Work <ArrowRightIcon size={20} /></button>
              </div>
            </div>
          );
        }

        function CrissCrossScreen({ onNext, onPrev }) {
          const [catIdx, setCatIdx] = useState(0);
          const [anIdx, setAnIdx] = useState(0);
          const [crossStep, setCrossStep] = useState(0);
          
          const cation = CATIONS[catIdx];
          const anion = ANIONS[anIdx];
          const gcd = (a, b) => (b === 0 ? a : gcd(b, a % b));
          const factor = gcd(cation.charge, anion.charge);
          const finalCatSub = anion.charge / factor;
          const finalAnSub = cation.charge / factor;

          return (
            <div className="space-y-6 animate-fade-in">
              <h2 className="text-2xl font-bold border-b pb-2 text-slate-800">The Formulae Detective</h2>
              <div className="flex gap-4 justify-center">
                <select className="p-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 font-medium" value={catIdx} onChange={(e) => { setCatIdx(Number(e.target.value)); setCrossStep(0); }}>
                  {CATIONS.map((c, i) => <option key={i} value={i}>{c.name} ({c.charge}+)</option>)}
                </select>
                <select className="p-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 font-medium" value={anIdx} onChange={(e) => { setAnIdx(Number(e.target.value)); setCrossStep(0); }}>
                  {ANIONS.map((a, i) => <option key={i} value={i}>{a.name} ({a.charge}-)</option>)}
                </select>
              </div>
              <div className="bg-slate-800 rounded-2xl p-12 text-white relative flex flex-col items-center justify-center min-h-[300px] shadow-inner">
                <div className={`flex gap-16 text-5xl transition-all ${crossStep > 0 ? 'mb-16' : ''}`}>
                  <Latex>{formatIonLatex(cation, true, crossStep)}</Latex>
                  <Latex>{formatIonLatex(anion, false, crossStep)}</Latex>
                </div>
                {crossStep >= 2 && (
                  <svg viewBox="0 0 460 160" className="absolute top-[45%] left-1/2 -translate-x-1/2 -translate-y-1/2 w-[460px] h-[160px] pointer-events-none opacity-90">
                    <defs>
                        <marker id="a1" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#fbbf24" /></marker>
                        <marker id="a2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#38bdf8" /></marker>
                    </defs>
                    <path d="M 185,20 C 200,90 280,70 280,135" stroke="#fbbf24" strokeWidth="3" strokeDasharray="5,5" fill="none" markerEnd="url(#a1)"/>
                    <path d="M 325,20 C 310,90 230,70 230,135" stroke="#38bdf8" strokeWidth="3" strokeDasharray="5,5" fill="none" markerEnd="url(#a2)"/>
                  </svg>
                )}
                {crossStep >= 3 && <div className="text-5xl mt-4 bg-slate-900/50 p-4 rounded-xl border border-slate-700 shadow-md"><Latex>{formatFormulaLatex(cation, anion, finalCatSub, finalAnSub)}</Latex></div>}
              </div>
              <div className="flex justify-center"><button onClick={() => setCrossStep((crossStep + 1) % 4)} className="bg-yellow-500 hover:bg-yellow-600 font-bold py-3 px-8 rounded-full flex items-center gap-2 shadow-lg transition-transform active:scale-95"><RefreshCwIcon size={20}/> {crossStep === 0 ? "Show Valency" : crossStep === 1 ? "Criss-Cross!" : crossStep === 2 ? "Final Formula" : "Reset"}</button></div>
              <div className="flex justify-between pt-8 border-t mt-8 border-slate-200">
                <button onClick={onPrev} className="bg-slate-200 hover:bg-slate-300 text-slate-700 transition-colors font-semibold py-2 px-6 rounded-lg flex items-center gap-2"><ArrowLeftIcon size={20} /> Previous</button>
                <button onClick={onNext} className="bg-indigo-600 hover:bg-indigo-700 transition-colors text-white font-semibold py-2 px-6 rounded-lg shadow-md flex items-center gap-2">Next Phase <ArrowRightIcon size={20} /></button>
              </div>
            </div>
          );
        }

        function DebateInputScreen({ onNext, onPrev, submitResponse }) {
          const [response, setResponse] = useState("");
          const [submitted, setSubmitted] = useState(false);
          
          const canSubmit = response.trim().length >= 50;
          
          const executeSubmit = () => {
              if (canSubmit) {
                  setSubmitted(true);
                  submitResponse(response);
              }
          };

          return (
            <div className="space-y-6 animate-fade-in">
              <div className="bg-purple-100 text-purple-900 text-sm font-bold px-4 py-3 rounded-xl border border-purple-200 shadow-sm leading-relaxed">
                E21CC: The student can use evidence and adopt different viewpoints to explain their reasoning and decisions.
              </div>
              <h2 className="text-2xl font-bold text-slate-800">The Chemist's Debate: Magnesium Oxide</h2>
              
              <div className="bg-indigo-50 p-5 rounded-xl border border-indigo-100 text-indigo-900 shadow-sm">
                <p>You are presented with The Chemist's Debate, where two students, Sarah and Tom, are arguing what the correct formula for Magnesium Oxide is. Their perspectives are shown below.</p>
                <p className="mt-2 font-bold">Evaluate each of their perspectives, stating clearly what is correct or incorrect about each of their ideas.</p>
              </div>

              <div className="grid md:grid-cols-2 gap-4 mt-2">
                <div className="bg-red-50 border border-red-200 p-4 rounded-xl italic text-slate-700 shadow-sm">"The correct formula should be <Latex>{"\\mathrm{Mg_2O_2}"}</Latex>!" - Sarah</div>
                <div className="bg-green-50 border border-green-200 p-4 rounded-xl italic text-slate-700 shadow-sm">"No! The formula should be <Latex>{"\\mathrm{MgO}"}</Latex>." - Tom</div>
              </div>
              
              <textarea 
                  className="w-full p-4 border border-slate-300 rounded-lg h-32 outline-none focus:ring-2 focus:ring-indigo-500 transition-shadow mt-4" 
                  placeholder="Evaluate the reasoning..." 
                  value={response} 
                  onChange={(e) => setResponse(e.target.value)} 
                  disabled={submitted}
              ></textarea>
              
              {!submitted ? (
                <div className="flex flex-col sm:flex-row items-center gap-4">
                    <button 
                        onClick={executeSubmit} 
                        className={`px-6 py-2 rounded-lg font-semibold transition-all w-full sm:w-auto flex items-center justify-center ${canSubmit ? 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-md' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`} 
                        disabled={!canSubmit}
                    >
                        Submit Reasoning
                    </button>
                    {!canSubmit && response.length > 0 && <span className="text-sm text-rose-500 font-medium animate-pulse">Please type at least 50 characters to explain your reasoning! ({response.trim().length}/50)</span>}
                </div>
              ) : (
                <div className="bg-emerald-50 border border-emerald-200 p-4 rounded-lg text-sm text-emerald-900 animate-fade-in shadow-sm flex items-center gap-3 mt-4">
                  <CheckCircleIcon size={24} className="text-emerald-600 shrink-0"/>
                  <p><strong>Reasoning logged securely!</strong> Please wait for your teacher to review the live dashboard before proceeding to the feedback screen.</p>
                </div>
              )}
              <div className="flex justify-between pt-8 border-t mt-8 border-slate-200">
                <button onClick={onPrev} className="bg-slate-200 hover:bg-slate-300 text-slate-700 transition-colors font-semibold py-2 px-6 rounded-lg flex items-center gap-2"><ArrowLeftIcon size={20} /> Previous</button>
                <button onClick={onNext} disabled={!submitted} className={`px-6 py-2 rounded-lg font-semibold transition-colors flex items-center gap-2 ${submitted ? 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-md' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>View Evaluation <ArrowRightIcon size={20} /></button>
              </div>
            </div>
          );
        }

        function DebateFeedbackScreen({ onNext, onPrev }) {
          return (
            <div className="space-y-6 animate-fade-in">
              <h2 className="text-2xl font-bold text-slate-800">The Chemist's Debate: Evaluation</h2>
              <div className="bg-green-50 border border-green-200 p-8 rounded-xl shadow-sm">
                <h4 className="font-bold flex items-center gap-2 mb-4 text-green-800 border-b border-green-200 pb-2"><CheckCircleIcon size={24}/> Teacher's Final Evaluation</h4>
                <p className="text-slate-800 text-lg mb-4 leading-relaxed">
                  <strong>Tom is correct.</strong> Ionic compounds form giant lattice structures, so their chemical formulae must represent the simplest whole-number ratio of ions. Just like how you simplify a ratio of 2:2 to 1:1 in mathematics, the ratio of Magnesium to Oxide ions must be simplified to 1:1, giving <strong className="text-indigo-700"><Latex>{"\\mathrm{MgO}"}</Latex></strong>.
                </p>
                <p className="text-slate-800 text-lg leading-relaxed">
                  <strong>Why Sarah is wrong:</strong> Sarah treated the criss-cross method as an unbreakable rule rather than a mathematical shortcut. By blindly crossing the 2s and leaving it as <Latex>{"\\mathrm{Mg_2O_2}"}</Latex>, she failed to reduce the formula to its simplest empirical ratio.
                </p>
              </div>
              <div className="flex justify-between pt-8 border-t mt-8 border-slate-200">
                <button onClick={onPrev} className="bg-slate-200 hover:bg-slate-300 text-slate-700 transition-colors font-semibold py-2 px-6 rounded-lg flex items-center gap-2"><ArrowLeftIcon size={20} /> Back to My Answer</button>
                <button onClick={onNext} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-bold shadow-md transition-colors flex items-center gap-2">Next Phase <ArrowRightIcon size={20} /></button>
              </div>
            </div>
          );
        }

        function ContextInputScreen({ onNext, onPrev, submitResponse }) {
          const [response, setResponse] = useState("");
          const [submitted, setSubmitted] = useState(false);
          
          const canSubmit = response.trim().length >= 50;
          
          const executeSubmit = () => {
              if (canSubmit) {
                  setSubmitted(true);
                  submitResponse(response);
              }
          };

          return (
            <div className="space-y-6 animate-fade-in">
              <div className="inline-block bg-teal-100 text-teal-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide mb-2">
                E21CC - The student can understand the similarities and differences between different contexts or situations and how this might affect their perspective or approach.
              </div>
              <h2 className="text-2xl font-bold text-slate-800">The "32 Oxygen" Factory Crisis</h2>
              
              <p className="text-slate-600">
                You are the head chemist programming an automated chemical mixer at a plant. A new worker was asked to input the formula for a lattice containing Magnesium (<Latex>{"\\mathrm{Mg}^{2+}"}</Latex>) and Nitrate (<Latex>{"\\mathrm{NO_3}^-"}</Latex>) ions into the system. 
              </p>
              
              <div className="bg-rose-50 border border-rose-200 p-6 rounded-xl my-6">
                 <h3 className="font-bold text-rose-800 flex items-center gap-2 mb-3">
                  <ShieldAlertIcon size={20} className="text-rose-600" /> 
                  The Worker's Mistake
                </h3>
                <p className="text-rose-900 mb-4">
                  The worker applied the standard criss-cross rule. Since Nitrate has a valency of 1 and Magnesium has a valency of 2, the worker just tacked the '2' onto the end of the Nitrate symbol. 
                </p>
                <div className="bg-white p-4 rounded-lg text-center border border-rose-100 shadow-sm">
                    <span className="text-slate-500 text-sm block mb-1">What the worker programmed:</span>
                    <span className="text-4xl font-bold text-red-600 line-through"><Latex>{"\\mathrm{MgNO_{32}}"}</Latex></span>
                    <p className="mt-3 text-rose-800 font-medium italic">"Boss, the mixer's AI just halted production! It thinks we need a lattice ratio of 1 Magnesium to 1 Nitrogen and THIRTY-TWO Oxygens! What went wrong?!"</p>
                </div>
              </div>

              <div className="bg-teal-50 border border-teal-200 p-6 rounded-xl">
                <h3 className="font-bold text-teal-800 flex items-center gap-2 mb-3">
                  <LightbulbIcon size={20} className="text-teal-600" /> 
                  Invent a Solution
                </h3>
                <p className="text-sm text-teal-900 mb-4 leading-relaxed">
                  The context has changed from single atoms (like <Latex>{"\\mathrm{Cl}^-"}</Latex>) to a <strong>polyatomic group</strong> (<Latex>{"\\mathrm{NO_3}^-"}</Latex>). <br/><br/>
                  Explain what has gone wrong that led to this crisis. How would YOU write this formula so the factory AI clearly understands that the lattice requires <strong>2 whole nitrate groups</strong> for every 1 magnesium ion, and not 32 oxygens?<br/><br/>
                  <strong className="text-teal-800">Your answer should clearly explain how you are going to resolve this communication crisis!</strong>
                </p>
                
                <div className="bg-teal-100/50 border border-teal-200 text-teal-800 text-sm italic px-4 py-2 rounded-lg mb-4 flex items-center gap-2">
                  <LightbulbIcon size={16} className="text-teal-600" />
                  <strong>Hint:</strong> How do you group objects together in Mathematics?
                </div>
                
                <textarea 
                  className="w-full p-4 border border-teal-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 min-h-[120px]"
                  placeholder="I would write the formula as... because..."
                  value={response}
                  onChange={(e) => setResponse(e.target.value)}
                  disabled={submitted}
                ></textarea>
                
                {!submitted ? (
                   <div className="flex flex-col sm:flex-row items-center gap-4 mt-4">
                      <button 
                          onClick={executeSubmit} 
                          className={`px-6 py-2 rounded-lg font-semibold transition-all w-full sm:w-auto flex items-center justify-center ${canSubmit ? 'bg-teal-600 hover:bg-teal-700 text-white shadow-md' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`} 
                          disabled={!canSubmit}
                      >
                          Submit Invention
                      </button>
                      {!canSubmit && response.length > 0 && <span className="text-sm text-rose-500 font-medium animate-pulse">Elaborate a bit more! (Min 50 chars - Currently {response.trim().length}/50)</span>}
                  </div>
                ) : (
                  <div className="bg-emerald-50 border border-emerald-200 p-4 rounded-lg text-sm text-emerald-900 animate-fade-in shadow-sm flex items-center gap-3 mt-4">
                    <CheckCircleIcon size={24} className="text-emerald-600 shrink-0"/>
                    <p><strong>Solution logged securely!</strong> Hang tight. Wait for your teacher's instruction before you reveal the official convention.</p>
                  </div>
                )}
              </div>

              <div className="flex justify-between pt-8 border-t mt-8 border-slate-200">
                <button onClick={onPrev} className="bg-slate-200 hover:bg-slate-300 text-slate-700 transition-colors font-semibold py-2 px-6 rounded-lg flex items-center gap-2"><ArrowLeftIcon size={20} /> Previous</button>
                <button onClick={onNext} disabled={!submitted} className={`px-6 py-2 rounded-lg font-semibold transition-colors flex items-center gap-2 ${submitted ? 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-md' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>View Convention <ArrowRightIcon size={20} /></button>
              </div>
            </div>
          );
        }

        function ContextFeedbackScreen({ onNext, onPrev }) {
          return (
            <div className="space-y-6 animate-fade-in">
              <h2 className="text-2xl font-bold text-slate-800">The "32 Oxygen" Crisis: Resolved</h2>
              <div className="bg-white border border-teal-200 p-8 rounded-xl shadow-sm">
                <h4 className="font-bold text-teal-800 flex items-center gap-2 mb-4 border-b border-teal-100 pb-2"><CheckCircleIcon size={24}/> The Official Convention</h4>
                <p className="text-slate-700 text-lg mb-4 leading-relaxed">
                  Brilliant problem solving! Did you suggest circling the Nitrate? Using hyphens? Using different colors?
                </p>
                <p className="text-slate-700 text-lg leading-relaxed">
                  Chemists faced this exact same crisis! Because the context shifted to a group of atoms acting together, they had to invent a new syntax to show the correct ratio. They decided to use <strong>brackets</strong> to show that the subscript applies to everything inside the polyatomic group.
                </p>
                <div className="text-center mt-8 p-6 bg-slate-100 rounded-xl border border-slate-300 shadow-inner">
                   <span className="text-5xl font-bold text-indigo-600"><Latex>{"\\mathrm{Mg(NO_3)_2}"}</Latex></span>
                </div>
              </div>
              <div className="flex justify-between pt-8 border-t mt-8 border-slate-200">
                <button onClick={onPrev} className="bg-slate-200 hover:bg-slate-300 text-slate-700 transition-colors font-semibold py-2 px-6 rounded-lg flex items-center gap-2"><ArrowLeftIcon size={20} /> Back to My Answer</button>
                <button onClick={onNext} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-bold shadow-md transition-colors flex items-center gap-2">Proceed to Practice <ArrowRightIcon size={20} /></button>
              </div>
            </div>
          );
        }

        function PracticeScreen({ onNext, onPrev, submitResponse }) {
          const questions = [
            { cat: CATIONS[0], an: ANIONS[0], expC: 1, expA: 1 },
            { cat: CATIONS[2], an: ANIONS[0], expC: 1, expA: 2 },
            { cat: CATIONS[2], an: ANIONS[1], expC: 1, expA: 1 },
            { cat: CATIONS[4], an: ANIONS[1], expC: 2, expA: 3 },
            { cat: CATIONS[3], an: ANIONS[3], expC: 1, expA: 2 }
          ];

          const [qIdx, setQIdx] = useState(0);
          const [cSub, setCSub] = useState(1);
          const [aSub, setASub] = useState(1);
          const [feedback, setFeedback] = useState(null);

          const currentQ = questions[qIdx];

          const handleCheck = () => {
            if (cSub === currentQ.expC && aSub === currentQ.expA) {
              setFeedback('correct');
              setTimeout(() => {
                if (qIdx < questions.length - 1) {
                  setQIdx(qIdx + 1);
                  setCSub(1);
                  setASub(1);
                  setFeedback(null);
                } else {
                  setFeedback('finished');
                  submitResponse(`Scored 5/5 on the Subscript Challenge!`);
                }
              }, 1500);
            } else {
              setFeedback('wrong');
              setTimeout(() => setFeedback(null), 2000);
            }
          };

          const renderCatSymbol = () => {
            let sym = `\\mathrm{${currentQ.cat.symbol.replace(/(\d+)/g, '_{$1}')}}`;
            if (currentQ.cat.isPoly && cSub > 1) return `\\left(${sym}\\right)`;
            return sym;
          };
          const renderAnSymbol = () => {
            let sym = `\\mathrm{${currentQ.an.symbol.replace(/(\d+)/g, '_{$1}')}}`;
            if (currentQ.an.isPoly && aSub > 1) return `\\left(${sym}\\right)`;
            return sym;
          };

          return (
            <div className="space-y-6 animate-fade-in">
              <div className="flex items-center justify-between border-b border-slate-200 pb-4">
                <div className="flex items-center gap-2 text-indigo-700">
                  <TargetIcon size={28} />
                  <h2 className="text-2xl font-bold">The Subscript Challenge</h2>
                </div>
                <div className="font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-full text-sm">Question {qIdx + 1} of {questions.length}</div>
              </div>
              <div className="bg-slate-100 rounded-2xl p-8 border border-slate-200 mt-6 text-center shadow-sm">
                <div className="flex justify-center gap-12 text-3xl mb-8 opacity-80 font-medium">
                   <Latex>{formatIonLatex(currentQ.cat, true)}</Latex>
                   <Latex>+</Latex>
                   <Latex>{formatIonLatex(currentQ.an, false)}</Latex>
                </div>
                <div className="flex justify-center items-end text-5xl font-bold font-serif mb-8 bg-white p-6 rounded-xl shadow-inner inline-flex border border-slate-200">
                   <div className="text-slate-800"><Latex>{renderCatSymbol()}</Latex></div>
                   <select className={`text-2xl border-2 rounded p-1 mx-1 outline-none text-blue-600 font-sans cursor-pointer transition-colors ${cSub > 1 ? 'border-blue-400 bg-blue-50' : 'border-slate-200 bg-transparent text-transparent hover:text-blue-400'}`} value={cSub} onChange={(e)=>setCSub(Number(e.target.value))}>
                     {[1,2,3,4].map(n => <option key={n} value={n} className="text-slate-800">{n === 1 ? '1 (Hide)' : n}</option>)}
                   </select>
                   <div className="text-slate-800"><Latex>{renderAnSymbol()}</Latex></div>
                   <select className={`text-2xl border-2 rounded p-1 mx-1 outline-none text-yellow-600 font-sans cursor-pointer transition-colors ${aSub > 1 ? 'border-yellow-400 bg-yellow-50' : 'border-slate-200 bg-transparent text-transparent hover:text-yellow-400'}`} value={aSub} onChange={(e)=>setASub(Number(e.target.value))}>
                     {[1,2,3,4].map(n => <option key={n} value={n} className="text-slate-800">{n === 1 ? '1 (Hide)' : n}</option>)}
                   </select>
                </div>
                <div className="h-16 flex items-center justify-center">
                  {feedback === 'correct' && <div className="text-green-600 font-bold text-xl flex items-center gap-2 animate-bounce-short"><CheckCircleIcon /> Correct!</div>}
                  {feedback === 'wrong' && <div className="text-rose-600 font-bold flex items-center gap-2 animate-pulse"><ShieldAlertIcon /> Wrong! Identify the valency and use the cross method!</div>}
                  {feedback === 'finished' && <div className="text-indigo-600 font-bold text-xl">Challenge Complete!</div>}
                  {!feedback && <button onClick={handleCheck} className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-full font-bold shadow-md transition-transform active:scale-95">Check Formula</button>}
                </div>
              </div>
              <div className="flex justify-between pt-8 border-t mt-8 border-slate-200 animate-fade-in">
                <button onClick={onPrev} className="bg-slate-200 hover:bg-slate-300 text-slate-700 transition-colors font-semibold py-2 px-6 rounded-lg flex items-center gap-2"><ArrowLeftIcon size={20} /> Previous</button>
                {feedback === 'finished' && <button onClick={onNext} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-bold shadow-md transition-colors flex items-center gap-2">Complete Lesson <ArrowRightIcon size={20} /></button>}
              </div>
            </div>
          );
        }

        function SummaryScreen({ onReset, onPrev }) {
          return (
            <div className="text-center py-12 space-y-6 animate-fade-in">
              <div className="bg-green-100 p-6 rounded-full inline-block shadow-inner"><CheckCircleIcon size={80} className="text-green-500 mx-auto"/></div>
              <h2 className="text-4xl font-extrabold text-slate-800">Lesson Complete!</h2>
              <p className="text-slate-600 text-lg max-w-md mx-auto">You have successfully used evidence to determine ionic formulae and adapted to new contexts. Outstanding work, Detective.</p>
              <div className="max-w-md mx-auto bg-slate-100 rounded-xl p-6 text-left mt-8 border border-slate-200">
                <h3 className="font-bold text-slate-800 border-b pb-2 mb-4">Key Takeaways:</h3>
                <ul className="space-y-3 text-slate-700">
                  <li className="flex gap-2 items-start"><CheckCircleIcon size={18} className="text-indigo-500 mt-1 shrink-0"/> The Group number of the element allows you to deduce its charge.</li>
                  <li className="flex gap-2 items-start"><CheckCircleIcon size={18} className="text-indigo-500 mt-1 shrink-0"/> Ionic lattices require the simplest whole-number ratio.</li>
                  <li className="flex gap-2 items-start"><CheckCircleIcon size={18} className="text-indigo-500 mt-1 shrink-0"/> Polyatomic ions require brackets when multiplied in a ratio.</li>
                </ul>
              </div>
              <div className="pt-8 flex flex-col sm:flex-row justify-center gap-4 border-t border-slate-200 mt-8">
                <button onClick={onPrev} className="bg-slate-200 hover:bg-slate-300 text-slate-700 transition-colors font-semibold py-3 px-8 rounded-full flex items-center justify-center gap-2"><ArrowLeftIcon size={20} /> Review Lesson</button>
                <button onClick={onReset} className="bg-slate-800 hover:bg-slate-900 transition-colors text-white font-bold py-3 px-10 rounded-full shadow-lg">Start Fresh</button>
              </div>
            </div>
          );
        }

        function TeacherDashboard({ onClose, user }) {
          const [isUnlocked, setIsUnlocked] = useState(false);
          const [pin, setPin] = useState("");
          const [pinError, setPinError] = useState(false);
          const [res, setRes] = useState([]);
          const [copied, setCopied] = useState(false);
          const [showConfirm, setShowConfirm] = useState(false);
          const [isClearing, setIsClearing] = useState(false);
          
          useEffect(() => {
            if (!isLiveMode || !user || !isUnlocked) return;
            return onSnapshot(collection(db, 'studentResponses'), s => {
                const data = s.docs.map(d => ({id: d.id, ...d.data()}));
                setRes(data.sort((a,b) => b.timestamp - a.timestamp));
            });
          }, [user, isUnlocked]);

          const handleUnlock = () => {
            if (pin === "8600") {
              setIsUnlocked(true);
              setPinError(false);
            } else {
              setPinError(true);
              setPin("");
            }
          };

          const executeClearAll = async () => {
              if (!db) return;
              setIsClearing(true);
              try {
                  const deletePromises = res.map(r => deleteDoc(doc(db, 'studentResponses', r.id)));
                  await Promise.all(deletePromises);
                  setShowConfirm(false);
              } catch (e) {
                  console.error("Error clearing dashboard: ", e);
              } finally {
                  setIsClearing(false);
              }
          };

          const copyToClipboard = () => {
            const textToCopy = res.map(r => `Name: ${r.studentName}\nPhase: ${r.phase}\nResponse: ${r.text}\nTime: ${new Date(r.timestamp).toLocaleTimeString()}\n-------------------`).join('\n\n');
            navigator.clipboard.writeText(textToCopy).then(() => {
              setCopied(true);
              setTimeout(() => setCopied(false), 2000);
            });
          };

          if (!isUnlocked) {
            return (
              <div className="min-h-screen bg-slate-900 text-white flex flex-col items-center justify-center p-4 font-sans relative">
                <button onClick={onClose} className="absolute top-8 right-8 bg-slate-800 hover:bg-slate-700 text-slate-300 p-2 rounded-full"><XIcon size={24}/></button>
                <div className="bg-slate-800 p-10 rounded-3xl border border-slate-700 max-w-sm w-full text-center shadow-2xl animate-fade-in">
                  <div className="w-20 h-20 bg-indigo-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                    <LockIcon size={40} className="text-indigo-400" />
                  </div>
                  <h2 className="text-2xl font-bold mb-2">Teacher Vault</h2>
                  <p className="text-slate-400 text-sm mb-8">Enter your secure PIN to access live student responses.</p>
                  <input type="password" value={pin} onChange={e => {setPin(e.target.value); setPinError(false);}} onKeyDown={e => e.key === 'Enter' && handleUnlock()} placeholder="Enter PIN" className={`w-full bg-slate-900 border ${pinError ? 'border-rose-500' : 'border-slate-600'} rounded-xl p-4 text-center text-xl tracking-widest outline-none mb-2 text-white`}/>
                  {pinError && <p className="text-rose-500 text-sm mb-4 animate-pulse">Incorrect PIN.</p>}
                  <button onClick={handleUnlock} className="w-full bg-indigo-600 hover:bg-indigo-700 font-bold py-4 rounded-xl shadow-lg shadow-indigo-500/20 mt-4">Unlock Dashboard</button>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-slate-900 text-white p-8 font-sans relative">
              {showConfirm && (
                <div className="fixed inset-0 bg-slate-900/90 z-50 flex items-center justify-center p-4">
                  <div className="bg-slate-800 border border-rose-500/50 p-8 rounded-3xl max-w-md w-full text-center shadow-2xl">
                    <TrashIcon size={56} className="text-rose-500 mx-auto mb-4" />
                    <h3 className="text-2xl font-bold mb-2">Nuke all data?</h3>
                    <p className="text-slate-400 mb-8">Permanently delete all student responses.</p>
                    <div className="flex gap-4">
                      <button onClick={() => setShowConfirm(false)} className="flex-1 bg-slate-700 py-3 rounded-xl">Cancel</button>
                      <button onClick={executeClearAll} disabled={isClearing} className="flex-1 bg-rose-600 py-3 rounded-xl flex justify-center items-center">
                        {isClearing ? <RefreshCwIcon size={20} className="animate-spin" /> : "Delete All"}
                      </button>
                    </div>
                  </div>
                </div>
              )}

              <div className="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-slate-700 pb-4 gap-4">
                <h1 className="text-3xl font-bold flex items-center gap-3 text-indigo-400"><EyeIcon size={32}/> Live Student Responses</h1>
                <div className="flex items-center gap-3">
                    <button onClick={copyToClipboard} className="flex items-center gap-2 px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                      {copied ? <CheckCircleIcon size={18} className="text-green-400" /> : <CopyIcon size={18} />}
                      {copied ? "Copied!" : "Copy Output"}
                    </button>
                    <button onClick={() => setShowConfirm(true)} className="bg-rose-900/40 text-rose-200 border border-rose-700/50 px-4 py-2 rounded-lg font-bold flex items-center gap-2"><TrashIcon size={18} /> Clear Data</button>
                    <button onClick={onClose} className="bg-indigo-600 px-6 py-2 rounded-lg font-bold flex items-center gap-2"><XIcon size={18} /> Close Dashboard</button>
                </div>
              </div>
              <div className="grid md:grid-cols-2 gap-6">
                {res.map(r => (
                  <div key={r.id} className="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                    <div className="flex justify-between items-start mb-2">
                       <strong className="text-xl">{r.studentName}</strong>
                       <span className="text-xs font-mono text-slate-400 bg-slate-900 px-2 py-1 rounded">{new Date(r.timestamp).toLocaleTimeString()}</span>
                    </div>
                    <span className="inline-block px-3 py-1 bg-indigo-900/50 text-indigo-300 text-xs font-semibold rounded-full mb-4 uppercase tracking-wider">{r.phase}</span>
                    <p className="mt-2 text-slate-300 italic border-l-2 border-slate-600 pl-4 leading-relaxed">"{r.text}"</p>
                  </div>
                ))}
                {res.length === 0 && (
                   <div className="col-span-full py-20 text-center text-slate-500 flex flex-col items-center gap-4">
                      <RefreshCwIcon size={48} className="animate-spin text-slate-700" />
                      <p className="text-xl font-medium">Dashboard active. Waiting for submissions...</p>
                   </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
